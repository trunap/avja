<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apendiks — Persiapan Acara</title>

  <link rel="stylesheet" href="../assets/style.css?v=1">

  <style>
    /* ======================
       PREMIUM PAGE STYLING
    ====================== */

    .wrap {
      max-width: 1050px;
      margin: auto;
      padding: 32px 20px;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ap-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .ap-sub {
      opacity: .7;
      margin-bottom: 32px;
      font-size: 15px;
    }

    /* MAIN CARD */
    .team-card {
      background: var(--card);
      border-radius: 18px;
      padding: 26px;
      margin-bottom: 34px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 26px rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      transition: .28s ease;
    }
    .team-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.55);
    }

    /* HEAD */
    .team-head {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Sexy icons */
    .head-icon {
      font-size: 22px;
      opacity: .9;
    }

    /* Colors */
    .audio-head { color: var(--audio); }
    .video-head { color: var(--video); }
    .stage-head { color: var(--stage); }
    .it-head    { color: var(--it); }

    /* SUBGRID */
    .subgrid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    /* SUBCARD */
    .subcard {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      transition: .25s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    .subcard:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.07);
    }

    .subcard-title {
      font-weight: 800;
      margin-bottom: 12px;
      font-size: 15px;
      opacity: .95;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* NAME LIST */
    .name {
      padding: 6px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      opacity: .9;
    }

    .name:last-child {
      border-bottom: none;
    }

    .name[contenteditable] {
      cursor: text;
      border-radius: 6px;
      transition: .2s ease;
    }
    .name[contenteditable]:hover {
      background: rgba(255,255,255,0.05);
    }
    .name[contenteditable]:focus {
      outline: 2px solid #facc15;
      background: rgba(255,255,200,0.16);
    }

    /* ✅ KAPTEN (neutral formal badge) */
    .captain {
      background: rgba(255,215,0,0.12);
      border-left: 3px solid #FFD700;
      font-weight: 800 !important;
      color: #FFD700;
      padding-left: 8px !important;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .captain::before {
      content: "🎖️";
      font-size: 15px;
      opacity: .95;
    }

  </style>

</head>

<body>

<div class="wrap">

  <h1 class="ap-title">Persiapan Acara</h1>
  <p class="ap-sub">Instalasi • Pemanasan • Setup Area</p>

  <!-- ================= AUDIO ================= -->
  <div class="team-card">
    <div class="team-head audio-head">
      <span class="head-icon">🎚️</span> Audio
    </div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name captain" contenteditable="true">Peni</div>
        <div class="name" contenteditable="true">Sarah</div>
        <div class="name" contenteditable="true">Emma</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name captain" contenteditable="true">Truna</div>
        <div class="name" contenteditable="true">Evan</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Kabel</div>
        <div class="name captain" contenteditable="true">Anggid</div>
        <div class="name" contenteditable="true">Vina</div>
        <div class="name" contenteditable="true">Yonna</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Speaker</div>
        <div class="name captain" contenteditable="true">Malkhiel</div>
        <div class="name" contenteditable="true">Surya</div>
        <div class="name" contenteditable="true">Edo</div>
        <div class="name" contenteditable="true">Rian</div>
        <div class="name" contenteditable="true">Naela</div>
      </div>

    </div>
  </div>


  <!-- ================= VIDEO ================= -->
  <div class="team-card">
    <div class="team-head video-head">
      <span class="head-icon">🎥</span> Video
    </div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Videotron 1</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Videotron 2</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">TV</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Kabel</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">PTZ</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

    </div>
  </div>


  <!-- ================= IT ================= -->
  <div class="team-card">
    <div class="team-head it-head">
      <span class="head-icon">💻</span> IT
    </div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name captain" contenteditable="true"></div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
