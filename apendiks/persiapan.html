<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apendiks — Persiapan Acara</title>

  ../assets/style.css?v=1

  <style>
    .wrap { max-width:1000px; margin:auto; padding:24px; }
    .ap-title { font-size:36px; font-weight:900; margin-bottom:6px; }
    .ap-sub { opacity:.7; margin-bottom:24px; }

    .team-card {
      background: var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      margin-bottom:26px;
      padding:20px;
      box-shadow:0 6px 20px #0006;
    }

    .team-head {
      font-weight:900;
      font-size:20px;
      margin-bottom:14px;
      padding-bottom:8px;
      border-bottom:1px solid var(--line);
    }

    .audio-head { color: var(--audio); }
    .visual-head { color: var(--video); }
    .stage-head { color: var(--stage); }
    .it-head { color: var(--it); }

    .subgrid {
      display:grid;
      gap:14px;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    }

    .subcard {
      background:var(--bg);
      border-radius:10px;
      border:1px solid var(--line);
      padding:14px;
    }

    .subcard-title {
      font-weight:700;
      margin-bottom:8px;
    }

    .name { padding:4px 0; border-bottom:1px solid var(--line); }
    .name[contenteditable] { cursor:text; }
  </style>
</head>

<body>

<div class="wrap">

  <h1 class="ap-title">Persiapan Acara</h1>
  <p class="ap-sub">Instalasi – Pemanasan – Setup Area</p>

  <!-- TEAM AUDIO -->
  <div class="team-card">
    <div class="team-head audio-head">Team Audio</div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name" contenteditable="true">Peni</div>
        <div class="name" contenteditable="true">Sarah</div>
        <div class="name" contenteditable="true">Emma</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name" contenteditable="true">Truna</div>
        <div class="name" contenteditable="true">Evan</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Kabel</div>
        <div class="name" contenteditable="true">Anggid</div>
        <div class="name" contenteditable="true">Vina</div>
        <div class="name" contenteditable="true">Yonna</div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Speaker</div>
        <div class="name" contenteditable="true">Malkhiel</div>
        <div class="name" contenteditable="true">Surya</div>
        <div class="name" contenteditable="true">Edo</div>
        <div class="name" contenteditable="true">Rian</div>
        <div class="name" contenteditable="true">Naela</div>
      </div>

    </div>
  </div>

  <!-- TEAM VISUAL -->
  <div class="team-card">
    <div class="team-head visual-head">Team Visual</div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Videotron 1</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Videotron 2</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">TV</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Kabel</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">PTZ</div>
        <div class="name" contenteditable="true"></div>
      </div>

    </div>
  </div>

  <!-- TEAM IT -->
  <div class="team-card">
    <div class="team-head it-head">Team IT</div>

    <div class="subgrid">

      <div class="subcard">
        <div class="subcard-title">Inventaris</div>
        <div class="name" contenteditable="true"></div>
      </div>

      <div class="subcard">
        <div class="subcard-title">Booth</div>
        <div class="name" contenteditable="true"></div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
