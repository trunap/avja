<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AUDIO — Panduan Teknis</title>

  <link rel="stylesheet" href="assets/style.css?v=40">

  <style>
    /* --- PREMIUM AUDIO PAGE --- */

    .audio-wrap {
      max-width: 1100px;
      margin: auto;
      padding: 32px 20px;
    }

    .hero-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .hero-sub {
      opacity: .7;
      margin-bottom: 26px;
    }

    .hero-grid {
      display: grid;
      gap: 24px;
      margin-top: 10px;
    }
    @media(min-width:720px){
      .hero-grid {
        grid-template-columns: repeat(2,1fr);
      }
    }

    /* CARD PREMIUM */
    .card-hero {
      position: relative;
      min-height: 230px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 8px 26px rgba(0,0,0,.5);
      transition: .3s;
    }
    .card-hero:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 38px rgba(0,0,0,.65);
    }

    .card-hero img {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit: cover;
      filter: brightness(.7) saturate(1.1);
      transition:.3s;
    }
    .card-hero:hover img {
      filter: brightness(.9) saturate(1.3);
    }

    .card-hero .label {
      position:relative;
      z-index:2;
      font-size:36px;
      font-weight:900;
      color:white;
      padding:0 16px;   /* ✅ tidak mepet kiri */
      text-shadow:0 3px 16px rgba(0,0,0,.6);
      opacity:0;
      transform:translateY(16px);
      transition:.3s;
    }
    .card-hero:hover .label {
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">
    <a class="brand" href="index.html">PANDUAN TEKNIS</a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a class="active" href="audio.html">Audio</a>
      <a href="video.html">Video</a>
      <a href="stage.html">Podium</a>
      <a href="it.html">IT</a>

      <button id="themeBtn" class="theme-toggle">🌙 Dark</button>
    </nav>
  </div>
</div>

<script src="assets/theme.js?v=40"></script>

<div class="audio-wrap">

  <h1 class="hero-title">AUDIO</h1>
  <p class="hero-sub">Sub‑pages untuk seksi Audio</p>

  <section class="hero-grid">

    <!-- ✅ BOOTH -->
    <a class="card" href="audio/booth.html">
      <div class="card-hero">
        <img src="assets/img/audio-booth.jpg" alt="Audio Booth">
        <span class="label" style="color:var(--audio)">BOOTH</span>
      </div>
    </a>

    <!-- ✅ SPEAKER -->
    <a class="card" href="audio/speaker.html">
      <div class="card-hero">
        <img src="assets/img/audio-speaker.jpg" alt="Speaker">
        <span class="label" style="color:var(--audio)">SPEAKER</span>
      </div>
    </a>

    <!-- ✅ KABEL -->
    <a class="card" href="audio/kabel.html">
      <div class="card-hero">
        <img src="assets/img/audio-kabel.jpg" alt="Kabel">
        <span class="label" style="color:var(--audio)">KABEL</span>
      </div>
    </a>

    <!-- ✅ INVENTARIS -->
    <a class="card" href="audio/inventaris.html">
      <div class="card-hero">
        <img src="assets/img/audio-inventaris.jpg" alt="Inventaris Audio">
        <span class="label" style="color:var(--audio)">INVENTARIS</span>
      </div>
    </a>

  </section>

  <footer style="margin-top:40px; opacity:.6; text-align:center;">
    © 2026 — Disusun oleh Truna
  </footer>

</div>

</body>
</html>
