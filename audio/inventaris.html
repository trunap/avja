<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="bg-slate-50 font-sans">

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <div class="bg-white rounded-xl max-w-3xl w-full p-4 relative">
    <button onclick="closeModal()" class="absolute top-2 right-3 text-xl">×</button>
    <img id="modalImage" class="w-full h-80 object-contain rounded bg-slate-100 mb-4">
    <div id="modalThumbs" class="grid grid-cols-4 gap-2"></div>
  </div>
</div>

<!-- NAV -->
<nav class="bg-slate-900 text-white p-5 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
    <h1 class="font-black uppercase">Inventory</h1>

    <div class="flex gap-2">
      <select id="filterTim" class="rounded px-2 py-1 text-black text-sm">
        <option value="">Semua Tim</option>
      </select>
      <input id="searchInput" placeholder="Cari barang..." class="rounded px-3 py-1 text-black text-sm">
    </div>
  </div>
</nav>

<!-- CONTENT -->
<main class="max-w-7xl mx-auto px-4 py-8">
  <p id="loading" class="text-slate-500 mb-6">Sinkronisasi data…</p>
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxqYuDc3sd9VCJj6tw7Ikb9yFc9VisS4E3iFTPTqE7UEG190owRXFlcxaG0vkVt1veU/exec";

let allData = [];
let filteredData = [];

async function init() {
  try {
    const res = await fetch(API_URL);
    const raw = await res.json();

    allData = raw.filter(
      d => d.nama_barang && d.nama_barang !== "Nama Barang"
    );

    setupFilter();
    applyFilter();

    document.getElementById("loading").remove();
  } catch (e) {
    document.getElementById("loading").innerText = "Gagal memuat data";
    console.error(e);
  }
}

function setupFilter() {
  const select = document.getElementById("filterTim");
  const timSet = [...new Set(allData.map(i => i.tim).filter(Boolean))];

  timSet.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    select.appendChild(opt);
  });

  select.onchange = applyFilter;
  document.getElementById("searchInput").oninput = applyFilter;
}

function applyFilter() {
  const tim = document.getElementById("filterTim").value;
  const keyword = document.getElementById("searchInput").value.toLowerCase();

  filteredData = allData.filter(i =>
    (!tim || i.tim === tim) &&
    i.nama_barang.toLowerCase().includes(keyword)
  );

  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = filteredData.map((item, i) => `
    <div class="bg-white rounded-xl shadow hover:shadow-lg transition cursor-pointer overflow-hidden"
         onclick="openModal(${i})">

      <img src="${item.foto_1 || 'https://via.placeholder.com/400'}"
           class="w-full h-40 object-cover  <span class="inline-block text-xs mb-2 px-2 py-0.5 rounded bg-slate-100">
          ${item.tim || '-'}
        </span>

        <p class="text-xs italic text-slate-600 mb-3 line-clamp-2">
          ${item.keterangan || '-'}
        </p>

        <div class="flex justify-between items-center">
          <span class="text-sm font-bold">QTY: ${item.jumlah}</span>
          <span class="text-xs font-bold px-2 py-1 rounded bg-green-100 text-green-700">
            ${item.kondisi}
          </span>
        </div>
      </div>
    </div>
  `).join("");
}

function openModal(index) {
  const item = filteredData[index];
  const photos = [item.foto_1, item.foto_2, item.foto_3, item.foto_4].filter(Boolean);

  document.getElementById("modalImage").src = photos[0] || "";
  document.getElementById("modalThumbs").innerHTML = photos.map(p => `
    <img src="${p}" class="h-20 w-full object-cover rounded cursor-pointer"
         onclick="document.getElementById('modalImage').src='${p}'");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
}

window.onload = init;
</script>

</body>
</html>
