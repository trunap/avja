<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50">

<nav class="bg-slate-900 text-white p-4">
  <h1 class="font-bold">INVENTORY</h1>
</nav>

<div class="p-6">
  <p id="loading" class="text-slate-500">Sinkronisasi data...</p>
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxqYuDc3sd9VCJj6tw7Ikb9yFc9VisS4E3iFTPTqE7UEG190owRXFlcxaG0vkVt1veU/exec";

async function init() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("loading").remove();

    const grid = document.getElementById("grid");
    grid.innerHTML = data.map(item => `
      <div class="bg-white rounded shadow p-4">
        <img src="${item.foto_1 || 'https://via.placeholder.com/400'}"
             class="w-full h-40 object-cover mb-3>Jumlah: ${item.jumlah || '-'}</p>
      </div>
    `).join("");

  } catch (e) {
    document.getElementById("loading").innerText = "Gagal mengambil data";
    console.error(e);
  }
}

window.onload = init;
</script>

</body>
</html>
``
