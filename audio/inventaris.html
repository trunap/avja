<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVJA Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .card-img {
      height: 180px;
      object-fit: cover;
      width: 100%;
      background: #e2e8f0;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .thumb {
      cursor: pointer;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      opacity: 0.6;
      border: 2px solid transparent;
    }
    .active-thumb {
      opacity: 1;
      border-color: #2563eb;
    }
  </style>
</head>

<body class="bg-slate-50 font-sans">

<!-- MODAL GALERI -->
<div id="imgModal" class="modal" onclick="closeModal()">
  <div class="bg-white p-4 rounded-3xl max-w-2xl w-full" onclick="event.stopPropagation()">
    <img id="mainModalImg" class="w-full h-80 object-contain rounded-xl mb-4 bg-slate-100" />
    <h2 id="modalTitle" class="text-xl font-bold mb-3"></h2>
    <div id="thumbContainer" class="grid grid-cols-4 gap-2"></div>
    <button onclick="closeModal()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold text-xs">
      Tutup Galeri
    </button>
  </div>
</div>

<!-- NAVBAR -->
<nav class="bg-slate-900 text-white p-5 sticky top-0 shadow-lg z-50">
  <div class="container mx-auto flex justify-between items-center">
    <h1 class="font-black text-blue-500 uppercase">Inventory</h1>
    <input id="searchInput" type="text" placeholder="Cari barang..."
      class="bg-slate-800 px-4 py-2 text-xs rounded-full outline-none w-40">
  </div>
</nav>

<!-- GRID -->
<div class="container mx-auto px-4 py-8">
  <div id="loading" class="text-center py-24">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-3"></div>
    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Sinkronisasi Data</p>
  </div>

  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxqYuDc3sd9VCJj6tw7Ikb9yFc9VisS4E3iFTPTqE7UEG190owRXFlcxaG0vkVt1veU/exec";
let currentData = [];

async function init() {
  const res = await fetch(API_URL);
  currentData = await res.json();
  render(currentData);
  document.getElementById("loading").remove();
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = data.map((item, i) => `
    <div onclick="openModal(${i})"
      class="bg-white rounded-3xl overflow-hidden shadow hover:shadow-xl transition cursor-pointer">
      
      <img src="${item.foto_1 || 'https://via.placeholder.com/400?text=No+Photo'}"
           class="card-imgass="font-black text-sm uppercase">${item.nama_barang}</h3>

          <!-- ✅ GROUP / TIM DARI DROPDOWN -->
          <span class="text-[9px] font-bold px-2 py-0.5 rounded uppercase
            ${item.tim === 'Audio-Booth' ? 'bg-green-100 text-green-700' :
              item.tim === 'Audio-Speaker' ? 'bg-blue-100 text-blue-700' :
              item.tim === 'Audio-Kabel' ? 'bg-purple-100 text-purple-700' :
              'bg-slate-100 text-slate-600'}">
            ${item.tim}
          </span>
        </div>

        <p class="text-[10px] text-slate-500 italic mb-4 line-clamp-3">
          ${item.keterangan || '-'}
        </p>

        <div class="flex justify-between items-end">
          <div>
            <span class="block text-[9px] text-slate-400 font-bold">QTY</span>
            <span class="text-2xl font-black text-blue-600">${item.jumlah}</span>
          </div>

          <span class="text-[9px] font-black px-3 py-1 rounded-lg uppercase
            ${item.kondisi.toLowerCase().includes('bagus')
              ? 'bg-green-100 text-green-700'
              : 'bg-red-100 text-red-700'}">
            ${item.kondisi}
          </span>
        </div>
      </div>
    </div>
  `).join("");
}

function openModal(i) {
  const item = currentData[i];
  const photos = [item.foto_1, item.foto_2, item.foto_3, item.foto_4].filter(Boolean);

  document.getElementById("modalTitle").innerText = item.nama_barang;
  document.getElementById("mainModalImg").src = photos[0] || "";
  document.getElementById("thumbContainer").innerHTML = photos.map((p,j)=>`
    <img src="${p}" onclick="changeImg('${p}',this)" class="thumb ${j===0?'activelex";
}

function changeImg(src, el) {
  document.getElementById("mainModalImg").src = src;
  document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active-thumb"));
  el.classList.add("active-thumb");
}

function closeModal() {
  document.getElementById("imgModal").style.display = "none";
}

document.getElementById("searchInput").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(currentData.filter(i => i.nama_barang.toLowerCase().includes(val)));
});

window.onload = init;
</script>

</body>
</html>
