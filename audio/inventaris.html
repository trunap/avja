<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  https://cdn.tailwindcss.comscript>
</head>

<body class="bg-slate-50 font-sans">

<nav class="bg-slate-900 text-white p-5 sticky top-0">
  <h1 class="font-black uppercase">Inventory</h1>
</nav>

<div class="container mx-auto px-4 py-8">

  <p id="loading" class="text-slate-500 mb-6">Sinkronisasi data…</p>

  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxqYuDc3sd9VCJj6tw7Ikb9yFc9VisS4E3iFTPTqE7UEG190owRXFlcxaG0vkVt1veU/exec";

async function init() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    // ✅ buang baris kosong & header
    const cleaned = data.filter(
      d => d.nama_barang && d.nama_barang !== "Nama Barang"
    );

    document.getElementById("loading").remove();

    const grid = document.getElementById("grid");
    grid.innerHTML = cleaned.map(item => `
      <div class="bg-white rounded-xl shadow overflow-hidden">

        <img src="${item.foto_1 || 'https://via.placeholder.com/400'}"
             class="w-full h-44mb-1">${item.nama_barang}</h3>

          <span class="inline-block text-xs mb-2 px-2 py-0.5 rounded bg-slate-100">
            ${item.tim || '-'}
          </span>

          <p class="text-xs italic text-slate-600 mb-3">
            ${item.keterangan || '-'}
          </p>

          <div class="flex justify-between items-center">
            <span class="text-sm font-bold">QTY: ${item.jumlah}</span>
            <span class="text-xs font-bold px-2 py-1 rounded
              ${(item.kondisi||'').toLowerCase().includes('bagus')
                ? 'bg-green-100 text-green-700'
                : 'bg-red-100 text-red-700'}">
              ${item.kondisi}
            </span>
          </div>
        </div>

      </div>
    `).join("");
  } catch (e) {
    document.getElementById("loading").innerText = "Gagal memuat data";
    console.error(e);
  }
}

window.onload = init;
</script>

</body>
</html>
