<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris AV 2026 - AVJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-img { height: 220px; object-fit: cover; width: 100%; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="glass-nav text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest text-blue-500">AVJA <span class="text-white">INVENTORY</span></h1>
            <a href="../index.html" class="text-sm font-bold hover:text-blue-400 transition">KEMBALI KE HOME</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-bold text-slate-800">Daftar Inventaris</h2>
                <p class="text-slate-500 mt-1">Data aset Audio Video terupdate secara real-time.</p>
            </div>
            
            <div class="relative w-full md:w-1/3">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Cari nama barang atau tim..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-blue-500 text-slate-700 outline-none">
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-500 font-medium">Menghubungkan ke database...</p>
        </div>

        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbzxi0pJ7dZZEHB_rG5Hcby0O2qYhFC9GNZDy6D67Jg6QFpZ6zQVbWsH6VsEwU8b2Yn_/exec"; 

        let inventoryData = [];

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                inventoryData = await response.json();
                renderCards(inventoryData);
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                console.error("Gagal load data:", error);
                document.getElementById('loading').innerHTML = "<p class='text-red-500 font-bold'>Gagal mengambil data dari Google Sheets!</p>";
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = "";

            data.forEach(item => {
                // Penyesuaian nama kolom (di JS spasi jadi underscore dan huruf kecil)
                const img = item.foto_1 || "https://via.placeholder.com/400x300?text=No+Photo";
                const badgeColor = item.kondisi === "Bagus" ? "bg-green-100 text-green-700" : "bg-orange-100 text-orange-700";

                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 border border-gray-200 group">
                        <div class="relative overflow-hidden">
                            <img src="${img}" alt="${item.nama_barang}" class="card-img group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black text-slate-800 shadow-sm">
                                ${item.tim ? item.tim.toUpperCase() : 'UMUM'}
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-lg font-bold text-slate-800 uppercase leading-tight mb-2">${item.nama_barang}</h3>
                            <p class="text-gray-400 text-xs italic mb-4">"${item.keterangan || '-'}"</p>
                            
                            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                                <div>
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Jumlah</p>
                                    <p class="text-2xl font-black text-blue-600">${item.jumlah}</p>
                                </div>
                                <span class="px-3 py-1 rounded-lg text-[10px] font-bold ${badgeColor}">
                                    ${item.kondisi || 'CHECKED'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Fungsi Pencarian
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                item.nama_barang.toLowerCase().includes(val) || 
                (item.tim && item.tim.toLowerCase().includes(val))
            );
            renderCards(filtered);
        });

        window.onload = fetchData;
    </script>
</body>
</html>
