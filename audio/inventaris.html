<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 font-sans">

<nav class="bg-slate-900 text-white p-4">
  <h1 class="font-bold">INVENTORY</h1>
</nav>

<main class="p-4">
  <p id="loading">Sinkronisasi data...</p>
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxqYuDc3sd9VCJj6tw7Ikb9yFc9VisS4E3iFTPTqE7UEG190owRXFlcxaG0vkVt1veU/exec";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const grid = document.getElementById("grid");
    document.getElementById("loading").remove();

    data.forEach(item => {
      if (!item.nama_barang || item.nama_barang === "Nama Barang") return;

      const card = document.createElement("div");
      card.className = "bg-white rounded shadow overflow-hidden";

      const img = document.createElement("img");
      img.src = item.foto_1 || "https://via.placeholder.com/400";
      img.className = "w-full h-40 object-cover";

      const body = document.createElement("div");
      body.className = "p-3";

      const name = document.createElement("h3");
      name.className = "font-bold text-sm mb-1";
      name.textContent = item.nama_barang;

      const tim = document.createElement("p");
      tim.className = "text-xs text-slate-600";
      tim.textContent = item.tim || "-";

      const qty = document.createElement("p");
      qty.className = "text-xs font-bold mt-2";
      qty.textContent = "QTY: " + item.jumlah;

      body.appendChild(name);
      body.appendChild(tim);
      body.appendChild(qty);

      card.appendChild(img);
      card.appendChild(body);

      grid.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Gagal memuat data";
    console.error(err);
  });
</script>

</body>
</html>
``
