<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory Control 🚀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary-orange: #FF7E27;
            --soft-orange: #FFF0E5;
            --primary-blue: #3A70E2;
            --soft-blue: #E8EFFF;
            --primary-purple: #8B5CF6;
            --soft-purple: #EDE9FE;
            --bg-color: #F4F5F7;
            --text-dark: #1A1A1A;
            --text-gray: #6B7280;
            --card-radius: 24px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color); color: var(--text-dark);
            padding-bottom: 80px; overflow-x: hidden;
        }

        /* HEADER */
        header { padding: 15px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .nav-container {
            max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.9);
            border-radius: 100px; display: flex; align-items: center; padding: 8px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5);
        }
        .logo-combined { display: flex; text-decoration: none; border-radius: 10px; overflow: hidden; font-weight: 800; font-size: 18px; margin-right: 12px; }
        .logo-part { padding: 6px 12px; display: flex; align-items: center; justify-content: center; }
        .logo-audio { background-color: var(--primary-orange); color: white; }
        .logo-video { background-color: var(--primary-blue); color: white; }
        .site-title { font-size: 16px; font-weight: 700; margin-right: auto; }

        /* HERO & FILTER */
        .hero { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .hero h1 { font-size: 42px; font-weight: 800; line-height: 1.2; }
        .hero h1 span { transform: rotate(-2deg); background: #FFE066; padding: 0 10px; border-radius: 8px; display: inline-block; }
        .hero p { color: var(--text-gray); font-size: 16px; margin-top: 12px; line-height: 1.5; margin-bottom: 20px;}
        
        .filter-container { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .custom-input {
            padding: 12px 16px; border-radius: 100px; border: 2px solid #E5E7EB;
            font-family: inherit; font-size: 14px; font-weight: 600; outline: none;
            transition: all 0.3s ease; background: white; cursor: pointer;
        }
        .custom-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px var(--soft-blue); }
        .search-bar { flex-grow: 1; min-width: 200px; cursor: text; }

        /* SECTIONS & GRID */
        .content-container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }

        /* CARDS */
        .mission-card {
            background: #ffffff; border: 2px solid #F0F0F0; border-radius: var(--card-radius);
            padding: 16px; transition: all 0.3s ease; height: 100%; position: relative;
            display: flex; flex-direction: column; cursor: pointer;
        }
        .mission-card:hover { border-color: #D1D5DB; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.04); }
        .mission-card:active { transform: scale(0.98); }

        .card-img {
            width: 100%; height: 160px; object-fit: cover; border-radius: 16px;
            margin-bottom: 15px; background: #F9FAFB;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .mission-card h3 { font-size: 18px; font-weight: 800; color: var(--text-dark); text-transform: uppercase; }
        .qty-badge { background: #1A1A1A; color: white; padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 800; }

        .tag-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 100px; letter-spacing: 0.5px; }
        .badge-blue { background: var(--soft-blue); color: var(--primary-blue); }
        .badge-orange { background: var(--soft-orange); color: var(--primary-orange); }
        .badge-purple { background: var(--soft-purple); color: var(--primary-purple); }
        .badge-green { background: #D1FAE5; color: #059669; }
        .badge-gray { background: #E5E7EB; color: #4B5563; }
        .badge-red { background: #FEE2E2; color: #DC2626; }

        .mission-card p { font-size: 13px; color: var(--text-gray); line-height: 1.4; font-style: italic; flex-grow: 1; }

        /* MODAL GALERI */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; border-radius: var(--card-radius); max-width: 600px; width: 100%;
            padding: 20px; position: relative; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-close {
            position: absolute; top: -40px; right: 0; background: none; border: none;
            font-size: 32px; cursor: pointer; color: white; font-weight: bold;
        }
        
        /* Modal Header Styles Baru */
        .modal-info-header { text-align: center; margin-bottom: 15px; }
        .modal-name { font-size: 22px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; color: var(--text-dark); }
        .modal-tag-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }

        .modal-main-img { width: 100%; height: 300px; object-fit: contain; border-radius: 16px; margin-bottom: 12px; background: #F4F5F7; }
        .modal-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .modal-thumb { width: 100%; height: 70px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .modal-thumb:hover { border-color: var(--primary-blue); }

        #loading { text-align: center; font-weight: 700; color: var(--text-gray); margin-top: 40px; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 32px; }
            .filter-container { flex-direction: column; align-items: stretch; }
            .custom-input { width: 100%; }
            .modal-content { padding: 15px; }
            .modal-main-img { height: 220px; }
            .modal-name { font-size: 18px; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="#" class="logo-combined">
            <div class="logo-part logo-audio">A</div>
            <div class="logo-part logo-video">V</div>
        </a>
        <div class="site-title">Inventory Control</div>
    </div>
</header>

<main>
    <section class="hero">
        <h1>Cek Logistik: <br><span>Ready for Action!</span> ⚡</h1>
        <p>Pantau ketersediaan barang, cari peralatan, dan cek foto kondisi fisik alat di sini.</p>
        
        <div class="filter-container">
            <select id="filterTim" class="custom-input">
                <option value="">🎯 Semua Tim</option>
            </select>
            <select id="filterMilik" class="custom-input">
                <option value="">🏢 Semua Kepemilikan</option>
            </select>
            <select id="sortNama" class="custom-input">
                <option value="default">🕒 Terbaru (Default)</option>
                <option value="az">🔤 Nama Barang (A-Z)</option>
            </select>
            <input id="searchInput" type="text" placeholder="🔍 Cari nama barang..." class="custom-input search-bar">
        </div>
    </section>

    <div class="content-container">
        <p id="loading">⏳ Sinkronisasi data ke satelit...</p>
        <div id="grid" class="grid-cards"></div>
    </div>
</main>

<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <button id="closeModal" class="modal-close">✕</button>
        
        <div class="modal-info-header">
            <h2 id="modalName" class="modal-name">Nama Barang</h2>
            <div id="modalTags" class="modal-tag-group"></div>
        </div>

        <img id="modalImage" class="modal-main-img" src="" alt="Preview">
        <div id="modalThumbs" class="modal-thumbs"></div>
        <p id="modalDesc" style="margin-top: 15px; font-size: 14px; color: #6B7280; text-align: center; font-style: italic; background: #F4F5F7; padding: 10px; border-radius: 12px;"></p>
    </div>
</div>

<script>
// API URL
const BASE_URL = "https://script.google.com/macros/s/AKfycbwNGJQ3nYwvKRZOFJtKSw39Aq7H3gNa1WRcsPaUCNkm_syiq5p_8eGpbiLnzo3Aj9rj/exec";
const API_URL = BASE_URL + "?action=api";

// DOM Elements
const grid = document.getElementById("grid");
const filterTim = document.getElementById("filterTim");
const filterMilik = document.getElementById("filterMilik");
const sortNama = document.getElementById("sortNama");
const searchInput = document.getElementById("searchInput");

const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const modalThumbs = document.getElementById("modalThumbs");
const modalName = document.getElementById("modalName"); // Elemen nama di modal
const modalTags = document.getElementById("modalTags"); // Elemen badge di modal
const modalDesc = document.getElementById("modalDesc"); 
document.getElementById("closeModal").onclick = () => modal.classList.remove("active");

modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.classList.remove("active");
});

let allItems = [];

// Fetch Data
fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    document.getElementById("loading").style.display = "none";
    
    if(data.error) {
        document.getElementById("loading").style.display = "block";
        document.getElementById("loading").textContent = "❌ Error dari database: " + data.error;
        return;
    }

    allItems = data.filter(i => i.nama_barang && i.nama_barang !== "Nama Barang");
    populateFilters();
    renderItems();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "block";
    document.getElementById("loading").textContent = "❌ Gagal memuat data. Periksa URL Apps Script atau koneksi.";
    console.error("Error Fetch:", err);
  });

/* ===== FILTER POPULASI ===== */
function populateFilters() {
  const timSet = new Set();
  const milikSet = new Set();
  
  allItems.forEach(i => {
    if (i.tim && String(i.tim).trim() !== "") timSet.add(i.tim);
    if (i.barang_milik && String(i.barang_milik).trim() !== "") milikSet.add(i.barang_milik);
  });

  timSet.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    filterTim.appendChild(opt);
  });

  milikSet.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m; opt.textContent = m;
    filterMilik.appendChild(opt);
  });
}

/* ===== PEMBERSIH FOTO ANTI-ERROR ===== */
function getCleanImageUrl(rawString) {
    if (!rawString) return null;
    const str = String(rawString);
    const match = str.match(/id=([a-zA-Z0-9_-]+)/i);
    if (match && match[1]) {
        return "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w800";
    }
    if (str.startsWith("http") && !str.includes("=IMAGE")) {
        return str;
    }
    return null;
}

/* ===== FUNGSI PEMBUAT BADGE ===== */
// Fungsi ini dibuat agar bisa dipakai di kartu depan dan di dalam modal
function createBadges(item) {
    const frag = document.createDocumentFragment();
    
    const timBadge = document.createElement("span");
    timBadge.textContent = item.tim || "UMUM";
    timBadge.className = "badge ";
    const safeTim = String(item.tim || "");
    if (safeTim.includes("Booth")) timBadge.className += "badge-blue";
    else if (safeTim.includes("Speaker")) timBadge.className += "badge-purple";
    else if (safeTim.includes("Kabel")) timBadge.className += "badge-orange";
    else timBadge.className += "badge-gray";
    frag.appendChild(timBadge);

    if (item.barang_milik) {
        const milikBadge = document.createElement("span");
        milikBadge.textContent = item.barang_milik;
        milikBadge.className = "badge badge-green";
        frag.appendChild(milikBadge);
    }
    
    if (item.kondisi) {
        const kondisiBadge = document.createElement("span");
        kondisiBadge.textContent = item.kondisi;
        kondisiBadge.className = String(item.kondisi).toLowerCase() === "rusak" ? "badge badge-red" : "badge badge-gray";
        frag.appendChild(kondisiBadge);
    }
    
    return frag;
}

/* ===== RENDER KARTU ===== */
function renderItems() {
  grid.innerHTML = "";

  const timValue = filterTim.value.toLowerCase();
  const milikValue = filterMilik.value.toLowerCase();
  const sortValue = sortNama.value;
  const keyword = searchInput.value.toLowerCase();

  // 1. FILTER DATA
  let filteredData = allItems.filter(item => {
    const cocokTim = !timValue || (item.tim && String(item.tim).toLowerCase() === timValue);
    const cocokMilik = !milikValue || (item.barang_milik && String(item.barang_milik).toLowerCase() === milikValue);
    const cocokSearch = !keyword || String(item.nama_barang).toLowerCase().includes(keyword);
    return cocokTim && cocokMilik && cocokSearch;
  });

  // 2. SORTIR DATA (A-Z)
  if (sortValue === "az") {
    filteredData.sort((a, b) => {
      let namaA = String(a.nama_barang).toLowerCase();
      let namaB = String(b.nama_barang).toLowerCase();
      if (namaA < namaB) return -1;
      if (namaA > namaB) return 1;
      return 0;
    });
  }

  // 3. RENDER DATA KE KARTU
  filteredData.forEach(item => {
    const photos = [
        getCleanImageUrl(item.foto_1), 
        getCleanImageUrl(item.foto_2), 
        getCleanImageUrl(item.foto_3), 
        getCleanImageUrl(item.foto_4)
    ].filter(Boolean);

    const card = document.createElement("div");
    card.className = "mission-card";

    // FUNGSI KLIK MODAL
    card.onclick = () => {
      // Set Gambar
      modalImage.src = photos[0] || "https://via.placeholder.com/600x400?text=No+Image";
      modalThumbs.innerHTML = "";
      photos.forEach(p => {
        const t = document.createElement("img");
        t.src = p;
        t.className = "modal-thumb";
        t.onclick = (e) => { e.stopPropagation(); modalImage.src = p; }
        modalThumbs.appendChild(t);
      });
      
      // Set Judul di Modal
      modalName.textContent = item.nama_barang;
      
      // Set Badges di Modal
      modalTags.innerHTML = "";
      modalTags.appendChild(createBadges(item));

      // Set Deskripsi di Modal
      modalDesc.textContent = item.keterangan && String(item.keterangan).trim() !== "" ? item.keterangan : "Tidak ada keterangan tambahan.";
      
      modal.classList.add("active");
    };

    // GAMBAR KARTU DEPAN
    const img = document.createElement("img");
    img.src = photos[0] || "https://via.placeholder.com/400x300?text=No+Image";
    img.className = "card-img";

    // HEADER KARTU DEPAN
    const headerDiv = document.createElement("div");
    headerDiv.className = "card-header";
    
    const name = document.createElement("h3");
    name.textContent = item.nama_barang;
    
    const qty = document.createElement("span");
    qty.className = "qty-badge";
    qty.textContent = item.jumlah; 

    headerDiv.appendChild(name);
    headerDiv.appendChild(qty);

    // TAG/BADGE KARTU DEPAN
    const tagGroup = document.createElement("div");
    tagGroup.className = "tag-group";
    tagGroup.appendChild(createBadges(item)); // Menggunakan fungsi pembuat badge

    // DESKRIPSI KARTU DEPAN
    const desc = document.createElement("p");
    desc.textContent = item.keterangan && String(item.keterangan).trim() !== "" ? item.keterangan : "Tidak ada keterangan tambahan.";

    // GABUNGKAN SEMUA
    card.appendChild(img);
    card.appendChild(headerDiv);
    card.appendChild(tagGroup);
    card.appendChild(desc);
    
    grid.appendChild(card);
  });
}

/* ===== EVENTS ===== */
filterTim.onchange = renderItems;
filterMilik.onchange = renderItems;
sortNama.onchange = renderItems;
searchInput.oninput = renderItems;
</script>

</body>
</html>
