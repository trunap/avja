<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris AV 2026 - AVJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-img { height: 220px; object-fit: cover; width: 100%; background-color: #f3f4f6; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .search-shadow:focus { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <nav class="glass-nav text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest text-blue-500 uppercase">AVJA <span class="text-white">Inventory</span></h1>
            <a href="../index.html" class="text-xs font-bold bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition">KEMBALI KE HOME</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Inventaris AV 2026</h2>
                <p class="text-slate-500 mt-2">Database aset real-time terintegrasi dengan Telegram Bot.</p>
            </div>
            
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Cari alat..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg outline-none transition-all search-shadow">
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-400 font-medium animate-pulse">Menghubungkan ke database...</p>
        </div>

        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </div>

    <script>
        // URL API Terbaru Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbyfP6GZpi7Y-uHg_qY9MMXwFxfIqCl0cGRzVtiAKJhFbCfpQFQ6IIwY7mrYQshphu6P/exec"; 

        let inventoryData = [];

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                inventoryData = await response.json();
                renderCards(inventoryData);
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100 text-center">
                        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                        <p class="font-bold">Gagal Mengambil Data!</p>
                        <p class="text-sm">Periksa apakah Web App Apps Script sudah dideploy sebagai 'Anyone'.</p>
                    </div>`;
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = "";

            data.forEach(item => {
                // Mapping kolom sesuai Google Sheet Anda
                const nama = item.nama_barang || "Tanpa Nama";
                const jumlah = item.jumlah || "0";
                const kondisi = item.kondisi || "Check";
                const keterangan = item.keterangan || "-";
                
                // Mengambil Foto 1 dari Sheet
                const foto = item.foto_1 || "https://via.placeholder.com/400x300?text=No+Photo";
                
                // Logika Warna Status
                let badgeClass = "bg-gray-100 text-gray-700";
                const kLower = kondisi.toLowerCase();
                if(kLower.includes("bagus")) badgeClass = "bg-green-100 text-green-700";
                else if(kLower.includes("rusak")) badgeClass = "bg-red-100 text-red-700";
                else if(kLower.includes("periksa")) badgeClass = "bg-amber-100 text-amber-700";

                grid.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 border border-gray-100 group">
                        <div class="relative overflow-hidden">
                            <img src="${foto}" alt="${nama}" class="card-img group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Error'">
                            <div class="absolute top-5 left-5 bg-white/90 backdrop-blur-md px-4 py-1.5 rounded-xl text-[10px] font-black text-slate-800 shadow-sm uppercase tracking-widest">
                                ASSET
                            </div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight mb-2 group-hover:text-blue-600 transition-colors">${nama}</h3>
                            <p class="text-slate-400 text-xs font-medium mb-6 italic uppercase tracking-widest">"${keterangan}"</p>
                            
                            <div class="flex items-center justify-between pt-6 border-t border-gray-50">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter font-bold">Qty</p>
                                    <p class="text-3xl font-black text-slate-800">${jumlah}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter mb-1 font-bold">Status</p>
                                    <span class="px-4 py-2 rounded-xl text-[10px] font-black uppercase ${badgeClass}">
                                        ${kondisi}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Fitur Pencarian Real-time
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                (item.nama_barang && item.nama_barang.toLowerCase().includes(val)) ||
                (item.keterangan && item.keterangan.toLowerCase().includes(val))
            );
            renderCards(filtered);
        });

        window.onload = fetchData;
    </script>
</body>
</html>
