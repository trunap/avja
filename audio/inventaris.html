<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVJA Inventory - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-img { height: 180px; object-fit: cover; width: 100%; background: #e2e8f0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
        .thumb { cursor: pointer; height: 60px; object-fit: cover; border-radius: 8px; opacity: 0.6; border: 2px solid transparent; }
        .active-thumb { opacity: 1; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="imgModal" class="modal" onclick="closeModal()">
        <div class="bg-white p-4 rounded-3xl max-w-2xl w-full" onclick="event.stopPropagation()">
            <img id="mainModalImg" src="" class="w-full h-80 object-contain rounded-xl mb-4 bg-slate-100">
            <h2 id="modalTitle" class="text-xl font-bold uppercase mb-4"></h2>
            <div id="thumbContainer" class="grid grid-cols-4 gap-2"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Tutup Galeri</button>
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-5 sticky top-0 shadow-xl z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-blue-500 uppercase tracking-tighter">AVJA <span class="text-white">STOCK</span></h1>
            <input type="text" id="searchInput" placeholder="Cari barang..." class="bg-slate-800 text-xs px-4 py-2 rounded-full outline-none w-40 focus:ring-1 ring-blue-500">
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-3"></div>
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Sinkronisasi Data...</p>
        </div>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyn1HAJSCkc-eNgt5Q9qMKJzTFdtaMSCH1VYFjJNvJaqabGkMTnZ9XnPbHAosI2uJVc/exec"; 
        let currentData = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                render(currentData);
                document.getElementById('loading').remove();
            } catch (e) { alert("Data gagal dimuat."); }
        }

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map((item, i) => `
                <div onclick="openModal(${i})" class="bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all border border-slate-100 cursor-pointer overflow-hidden group">
                    <img src="${item.foto_1 || 'https://via.placeholder.com/400?text=No+Photo'}" class="card-img group-hover:scale-105 transition-all">
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="font-black text-slate-800 uppercase text-sm">${item.nama_barang}</h3>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-slate-100">${item.tim || 'AVJA'}</span>
                        </div>
                        <p class="text-slate-400 text-[10px] italic mb-4 line-clamp-2">${item.keterangan || '-'}</p>
                        <div class="flex justify-between items-end">
                            <div class="leading-none"><span class="text-[8px] font-bold text-slate-300 block">QTY</span><span class="text-2xl font-black text-blue-600">${item.jumlah}</span></div>
                            <span class="text-[9px] font-black px-3 py-1 rounded-lg uppercase ${item.kondisi.toLowerCase().includes('bagus') ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${item.kondisi}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(idx) {
            const item = currentData[idx];
            const modal = document.getElementById('imgModal');
            const photos = [item.foto_1, item.foto_2, item.foto_3, item.foto_4].filter(p => p);
            
            document.getElementById('modalTitle').innerText = item.nama_barang;
            document.getElementById('mainModalImg').src = photos[0] || '';
            document.getElementById('thumbContainer').innerHTML = photos.map((p, i) => `
                <img src="${p}" onclick="changeImg('${p}', this)" class="thumb ${i===0?'active-thumb':''}">
            `).join('');
            
            modal.style.display = 'flex';
        }

        function changeImg(src, el) {
            document.getElementById('mainModalImg').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active-thumb'));
            el.classList.add('active-thumb');
        }

        function closeModal() { document.getElementById('imgModal').style.display = 'none'; }

        document.getElementById('searchInput').addEventListener('input', e => {
            const val = e.target.value.toLowerCase();
            render(currentData.filter(i => i.nama_barang.toLowerCase().includes(val)));
        });

        window.onload = init;
    </script>
</body>
</html>
