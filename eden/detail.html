<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Inventaris - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .detail-container { max-width: 600px; margin: 0 auto; padding: 0 20px 80px; }
        
        /* Tombol Kembali di Atas Judul */
        .back-nav { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--it); font-weight: 800; font-size: 14px; margin-bottom: 20px; transition: 0.2s; }
        .back-nav:hover { opacity: 0.7; transform: translateX(-5px); }

        /* Foto Header */
        .img-display { width: 100%; height: 350px; border-radius: 24px; object-fit: cover; border: 1px solid var(--line); background: var(--card); margin-bottom: 30px; }

        /* Nama & Kategori (Emphasis) */
        .item-header { margin-bottom: 40px; }
        .item-category { font-size: 13px; font-weight: 800; color: var(--it); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .item-name { font-size: 42px; font-weight: 900; line-height: 1.1; margin: 0; letter-spacing: -1px; color: var(--text); }

        /* Sisa Stok Section */
        .stock-section { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 35px; text-align: center; margin-bottom: 40px; }
        .stock-label { font-size: 12px; font-weight: 800; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        
        #sisa-angka { font-size: 84px; font-weight: 900; line-height: 1; margin: 15px 0; color: var(--text) !important; }
        body.light #sisa-angka { color: #000000 !important; }
        
        /* Kontrol Stok Cepat */
        .stock-actions { display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 25px; }
        .qty-input { width: 70px; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,0.05); color: var(--text); text-align: center; font-weight: 900; font-size: 16px; }
        body.light .qty-input { background: #f4f4f4; color: #000; }

        /* Keterangan (Long Text Area) */
        .desc-section { margin-bottom: 40px; }
        .desc-label { font-size: 14px; font-weight: 800; margin-bottom: 15px; display: block; border-left: 4px solid var(--it); padding-left: 12px; }
        .desc-text { font-size: 16px; line-height: 1.7; opacity: 0.8; white-space: pre-wrap; color: var(--text); }

        .btn-edit-float { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 20px; border-radius: 16px; background: var(--it); color: white; text-decoration: none; font-weight: 900; font-size: 16px; transition: 0.3s; border: none; }
        .btn-edit-float:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="detail-container">
        <a href="invent_index.html" class="back-nav">
            <i class="fas fa-arrow-left"></i> KEMBALI KE LIST
        </a>

        <img id="detail-img" class="img-display" src="" alt="Loading...">

        <div class="item-header">
            <span id="detail-kategori" class="item-category">KATEGORI</span>
            <h1 id="detail-nama" class="item-name">Nama Barang</h1>
        </div>

        <div class="stock-section">
            <span class="stock-label">Sisa Stok Saat Ini</span>
            <div id="sisa-angka">0</div>
            <span id="detail-satuan" style="font-weight: 800; opacity: 0.4; font-size: 14px;">PCS</span>

            <div class="stock-actions">
                <button onclick="updateStok(-1)" class="btn-pill" style="width: 50px; height: 50px; font-size: 20px;">-</button>
                <input type="number" id="input-step" class="qty-input" value="1">
                <button onclick="updateStok(1)" class="btn-pill" style="width: 50px; height: 50px; font-size: 20px; background: var(--it); border-color: var(--it); color: white;">+</button>
            </div>
        </div>

        <div class="desc-section">
            <span class="desc-label">Keterangan & Spesifikasi</span>
            <div id="detail-ket" class="desc-text">Memuat deskripsi barang...</div>
        </div>

        <a id="link-edit" href="#" class="btn-edit-float">
            <i class="fas fa-pen"></i> EDIT INFORMASI BARANG
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script src="navbar.js"></script>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const ref = database.ref('/' + id);

        // Ambil Data Realtime
        ref.on('value', snap => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('detail-nama').innerText = data.nama;
            document.getElementById('detail-kategori').innerText = data.kategori || 'UMUM';
            document.getElementById('detail-satuan').innerText = data.satuan || 'UNIT';
            document.getElementById('sisa-angka').innerText = data.sisa;
            document.getElementById('detail-ket').innerText = data.keterangan || 'Tidak ada keterangan tambahan untuk barang ini.';
            document.getElementById('detail-img').src = data.foto_url || 'https://via.placeholder.com/600x400?text=No+Image';
            document.getElementById('link-edit').href = "invent_edit.html?id=" + id;
        });

        // Update Stok via Transaction (Lebih Aman)
        function updateStok(dir) {
            const step = parseInt(document.getElementById('input-step').value) || 1;
            const change = dir * step;

            ref.transaction(current => {
                if (current) {
                    let newSisa = (current.sisa || 0) + change;
                    if (newSisa < 0) newSisa = 0;
                    current.sisa = newSisa;
                    current.status_habis = (newSisa <= 0);
                }
                return current;
            });
        }
    </script>
</body>
</html>
