<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Inventaris</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .back-link { display: block; text-align: left; color: #6a41d8; text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .label-biru { color: #6a41d8; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; display: block; margin-top: 15px; }
        .text-detail { font-size: 1.1rem; margin-bottom: 15px; display: block; }
        .big-number { font-size: 4rem; font-weight: bold; color: #6a41d8; margin: 10px 0; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.2rem; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        button { background: #6a41d8; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        <a href="invent_index.html" class="back-link">← Kembali</a>
        
        <h1 id="nama-barang">Loading...</h1>
        
        <span class="label-biru">Keterangan:</span>
        <span class="text-detail" id="ket-barang">--</span>

        <span class="label-biru">Total Stok:</span>
        <span class="text-detail" id="total-lengkap">--</span>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <p>Sisa Saat Ini:</p>
        <div class="big-number" id="sisa-angka">--</div>
        <p id="satuan-teks" style="color: #888; margin-bottom: 20px;">Unit</p>

        <input type="number" id="input-sisa">
        <button id="btn-update">💾 Simpan Perubahan</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
    // 1. Konfigurasi Firebase (Gunakan milikmu yang asli)
    const firebaseConfig = {
		  apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0"
				};


    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Ambil ID dari URL (Contoh: ?id=001)
    const urlParams = new URLSearchParams(window.location.search);
    const idBarang = urlParams.get('id');

    if (!idBarang) {
        alert("ID Barang tidak ditemukan!");
        window.location.href = 'invent_index.html';
    }

    // 3. Referensi langsung ke ID barang di root database
    // Dulu: .ref('0/' + idBarang) -> SEKARANG: .ref('/' + idBarang)
    const refBarang = database.ref('/' + idBarang);

    // --- A. BACA DATA ---
    refBarang.on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
            // Update tampilan HTML
            document.getElementById('nama-barang').innerText = data.nama || "Tanpa Nama";
            document.getElementById('ket-barang').innerText = data.keterangan || "-";
            document.getElementById('total-lengkap').innerText = (data.total || 0) + " " + (data.satuan || "");
            document.getElementById('sisa-angka').innerText = data.sisa || 0;
            document.getElementById('satuan-teks').innerText = data.satuan || "";
            
            // Isi input field dengan angka sisa saat ini
            document.getElementById('input-sisa').value = data.sisa;
        } else {
            document.getElementById('nama-barang').innerText = "Barang Tidak Ditemukan";
        }
    });

    // --- B. UPDATE DATA ---
    document.getElementById('btn-update').addEventListener('click', () => {
        const sisaBaru = document.getElementById('input-sisa').value;

        if (sisaBaru === "" || isNaN(sisaBaru)) {
            alert("Masukkan angka yang valid!");
            return;
        }

        // Update ke Firebase
        refBarang.update({
            sisa: parseInt(sisaBaru)
        }).then(() => {
            alert("Berhasil memperbarui sisa stok!");
        }).catch((error) => {
            console.error("Error:", error);
            alert("Gagal update data.");
        });
    });
</script>
</body>
</html>
