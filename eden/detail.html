<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #sisa-angka { font-size: 72px; font-weight: 900; color: var(--text); margin: 10px 0; }
        body.light #sisa-angka { color: #000000 !important; }
        .img-header { width: 100%; height: 280px; object-fit: cover; border-radius: 20px; border: 1px solid var(--line); margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--line); }
        .btn-edit-link { display: block; text-align: center; padding: 18px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 800; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container" style="max-width: 600px; padding: 0 20px;">
        <img id="detail-img" class="img-header" src="">
        <div style="text-align: center; margin-bottom: 30px;">
            <p style="font-weight: 800; opacity: 0.5;">SISA STOK</p>
            <div id="sisa-angka">0</div>
            <p id="detail-satuan" style="font-weight: 700; opacity: 0.5;"></p>
        </div>
        <div class="info-row"><span>Nama</span><b id="detail-nama"></b></div>
        <div class="info-row"><span>Kategori</span><b id="detail-kategori"></b></div>
        <div class="info-row"><span>Total</span><b id="detail-total"></b></div>
        <a id="link-edit" href="#" class="btn-edit-link">EDIT BARANG</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script src="navbar.js"></script>
    <script src="../assets/theme.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        database.ref('/' + id).on('value', snap => {
            const data = snap.val();
            if (!data) return;
            document.getElementById('detail-nama').innerText = data.nama;
            document.getElementById('detail-kategori').innerText = data.kategori;
            document.getElementById('detail-total').innerText = data.total + " " + data.satuan;
            document.getElementById('detail-satuan').innerText = data.satuan;
            document.getElementById('sisa-angka').innerText = data.sisa;
            document.getElementById('detail-img').src = data.foto_url;
            document.getElementById('link-edit').href = "invent_edit.html?id=" + id;
        });
    </script>
</body>
</html>
