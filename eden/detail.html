<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - Inventaris</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .detail-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 30px; margin-top: 20px; text-align: center; }
        .big-sisa { font-size: 72px; font-weight: 900; color: var(--it); margin: 10px 0; }
        .input-group { margin-top: 25px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); padding: 15px; border-radius: 10px; width: 100%; text-align: center; font-size: 20px; margin-bottom: 15px; }
        body.light input { background: #fff; }
        .btn-update { background: var(--it); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; transition: .2s; }
        .btn-update:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">← KEMBALI</a>
            <button class="theme-toggle" id="themeBtn">🌙 Dark</button>
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        <div class="detail-card">
            <h1 id="nama-barang" style="font-weight:900;">...</h1>
            <p id="ket-barang" style="opacity:0.6; margin-bottom: 20px;">-</p>
            
            <p style="font-size: 14px; font-weight: 800; letter-spacing: 1px; opacity: 0.5;">SISA SAAT INI</p>
            <div class="big-sisa" id="sisa-angka">0</div>
            <p id="satuan-teks" style="font-weight: 600; opacity: 0.7;">Unit</p>

            <div class="input-group">
                <input type="number" id="input-sisa" placeholder="Update angka...">
                <button id="btn-update" class="btn-update">SIMPAN PERUBAHAN</button>
            </div>
        </div>
    </div>

    <script src="../assets/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const idBarang = new URLSearchParams(window.location.search).get('id');
        const refBarang = database.ref('/' + idBarang);

        refBarang.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('nama-barang').innerText = data.nama;
                document.getElementById('ket-barang').innerText = data.keterangan || "-";
                document.getElementById('sisa-angka').innerText = data.sisa;
                document.getElementById('satuan-teks').innerText = data.satuan;
                document.getElementById('input-sisa').value = data.sisa;
            }
        });

        document.getElementById('btn-update').addEventListener('click', () => {
            refBarang.update({ sisa: parseInt(document.getElementById('input-sisa').value) })
            .then(() => alert("Data Berhasil Diupdate!"));
        });
    </script>
</body>
</html>
