<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 12px; color: #9ab3d5; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Input Styles */
        input, select, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); 
            padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--it); background: rgba(255,255,255,0.08); }

        /* ID Display */
        #display-id { 
            padding: 15px; background: rgba(154, 179, 213, 0.05); border: 1px dashed var(--line); 
            border-radius: 12px; color: var(--it); font-weight: 900; font-size: 20px; text-align: center;
        }

        /* Photo Box */
        .photo-preview { 
            width: 100%; height: 220px; border-radius: 15px; border: 2px dashed var(--line); 
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: rgba(0,0,0,0.2);
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-submit { 
            background: var(--it); color: white; border: none; padding: 18px; border-radius: 12px; 
            width: 100%; font-weight: 900; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--it); margin-bottom:10px;"></i>
        <p>Mengunggah ke ImgBB...</p>
    </div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">← CANCEL</a>
            <h3 style="font-weight:900; margin:0; letter-spacing:-1px;">BARANG BARU</h3>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-group">
            <label>ID Registrasi (Otomatis)</label>
            <div id="display-id">Menghitung...</div>
            <input type="hidden" id="input-id">
        </div>

        <div class="form-group">
            <label>Foto Barang</label>
            <div class="photo-preview" id="photo-preview">
                <i class="fas fa-image fa-3x" style="opacity: 0.1;"></i>
            </div>
            <input type="file" id="file-input" accept="image/*">
            <input type="hidden" id="foto-url-hidden">
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="input-nama" placeholder="Misal: LED Wall P3.9">
        </div>

        <div class="form-group">
            <label>Kelompok / Tim</label>
            <select id="input-kategori">
                <option value="Lain-lain">Pilih Kategori</option>
                <option value="LED Wall">LED Wall</option>
                <option value="Booth">Booth</option>
                <option value="Kamera">Kamera</option>
                <option value="Audio">Audio</option>
            </select>
        </div>

        <div class="form-group">
            <label>Keterangan Tambahan</label>
            <textarea id="input-keterangan" rows="3" placeholder="Detail spesifikasi atau kelengkapan..."></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Total Stok</label>
                <input type="number" id="input-total" value="1">
            </div>
            <div class="form-group">
                <label>Satuan</label>
                <input type="text" id="input-satuan" value="Pcs">
            </div>
        </div>

        <button class="btn-submit" id="btn-save">SIMPAN KE DATABASE</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        let nextId = "";

        // 1. HITUNG ID TERAKHIR SECARA REALTIME
        database.ref('/').orderByKey().limitToLast(1).on('value', (snapshot) => {
            let lastId = 0;
            snapshot.forEach((child) => {
                lastId = parseInt(child.key) || 0;
            });
            const calculatedId = (lastId + 1).toString().padStart(3, '0');
            nextId = calculatedId;
            document.getElementById('display-id').innerText = "ID #" + calculatedId;
            document.getElementById('input-id').value = calculatedId;
        });

        // 2. AUTO UPLOAD IMGBB
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading').style.display = 'flex';
            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    const urlFixed = result.data.url.replace('i.ibb.co/', 'i.ibb.co.com/');
                    document.getElementById('foto-url-hidden').value = urlFixed;
                    document.getElementById('photo-preview').innerHTML = `<img src="${urlFixed}">`;
                }
            } catch (err) { alert("Gagal upload foto!"); }
            finally { document.getElementById('loading').style.display = 'none'; }
        });

        // 3. SIMPAN DATA
        document.getElementById('btn-save').addEventListener('click', () => {
            const nama = document.getElementById('input-nama').value.trim();
            const total = parseInt(document.getElementById('input-total').value) || 0;

            if (!nama) { alert("Nama barang tidak boleh kosong!"); return; }

            const dataBaru = {
                nama: nama,
                kategori: document.getElementById('input-kategori').value,
                keterangan: document.getElementById('input-keterangan').value,
                total: total,
                sisa: total, // Otomatis sama dengan total saat awal
                satuan: document.getElementById('input-satuan').value,
                foto_url: document.getElementById('foto-url-hidden').value,
                status_habis: (total <= 0)
            };

            database.ref('/' + nextId).set(dataBaru).then(() => {
                alert("Barang #" + nextId + " sukses didaftarkan!");
                window.location.href = "invent_index.html";
            });
        });
    </script>
</body>
</html>
