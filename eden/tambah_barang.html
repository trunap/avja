<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .form-group { margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); box-sizing: border-box; }
        body.light input, body.light select, body.light textarea { background: #f9f9f9; color: #000; }
        select option { background: #1a1d21; color: white; }
        body.light select option { background: white; color: black; }
        .btn-save { width: 100%; padding: 20px; background: var(--it); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container" style="max-width: 500px; padding: 0 20px;">
        <div class="form-group"><label>ID (Otomatis)</label><div id="display-id" style="font-weight: 900; font-size: 24px; color: var(--it);">...</div></div>
        <div class="form-group"><label>Foto</label><input type="file" id="file-input"></div>
        <div class="form-group"><label>Nama</label><input type="text" id="input-nama"></div>
        <div class="form-group"><label>Kategori</label><select id="input-kat"><option value="LED Wall">LED Wall</option><option value="Booth">Booth</option><option value="Kamera">Kamera</option></select></div>
        <div class="form-group"><label>Satuan</label><select id="input-sat"><option value="Pcs">Pcs</option><option value="Set">Set</option><option value="Unit">Unit</option></select></div>
        <button class="btn-save" id="btn-save">SIMPAN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script src="navbar.js"></script>
    <script src="../assets/theme.js"></script>
    <script>
        let nextId = "";
        database.ref('/').orderByKey().limitToLast(1).on('value', snap => {
            let last = 0; snap.forEach(c => last = parseInt(c.key) || 0);
            nextId = (last + 1).toString().padStart(3, '0');
            document.getElementById('display-id').innerText = "#" + nextId;
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const nama = document.getElementById('input-nama').value;
            if (!nama) return alert("Nama wajib diisi!");
            database.ref('/' + nextId).set({
                nama: nama, kategori: document.getElementById('input-kat').value,
                satuan: document.getElementById('input-sat').value, sisa: 1, total: 1, foto_url: ""
            }).then(() => window.location.href = "invent_index.html");
        });
    </script>
</body>
</html>
