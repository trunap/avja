<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container { max-width: 550px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 800; font-size: 12px; color: #9ab3d5; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); 
            padding: 16px; border-radius: 12px; width: 100%; font-size: 16px; box-sizing: border-box; outline: none;
        }
        body.light input, body.light select, body.light textarea { background: #f9f9f9; color: #333; }
        
        select option { background-color: #1a1d21; color: white; }
        body.light select option { background-color: #fff; color: #333; }

        .photo-preview { 
            width: 100%; height: 250px; border-radius: 16px; border: 2px dashed var(--line); 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: rgba(0,0,0,0.1);
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-submit { 
            background: var(--it); color: white; border: none; padding: 20px; border-radius: 14px; 
            width: 100%; font-weight: 900; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s;
        }
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    </style>
</head>
<body>
    <div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Mengunggah...</p></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">PANDUAN TEKNIS - Regional 2026</a>
            <button class="theme-toggle" id="themeBtn">🌙 Dark</button>
        </div>
    </nav>

    <div class="form-container">
        <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">TAMBAH DATA</h1>

        <div class="form-group">
            <label>ID Registrasi Otomatis</label>
            <div id="display-id" style="padding: 18px; border: 1px dashed var(--line); border-radius: 12px; color: var(--it); font-weight: 900; font-size: 22px; text-align: center;">Menghitung...</div>
        </div>

        <div class="form-group">
            <label>Foto Barang</label>
            <div class="photo-preview" id="photo-preview"><i class="fas fa-camera fa-3x" style="opacity: 0.1;"></i></div>
            <input type="file" id="file-input" accept="image/*">
            <input type="hidden" id="foto-url-hidden">
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="input-nama" placeholder="Monitor LED 24 Inch">
        </div>

        <div class="form-group">
            <label>Tim / Kategori</label>
            <select id="input-kategori">
                <option value="Audio">Audio</option>
                <option value="Video">Video</option>
                <option value="Podium">Podium</option>
                <option value="IT">IT</option>
            </select>
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <textarea id="input-keterangan" rows="3" placeholder="Tambahkan catatan..."></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group"><label>Total Stok</label><input type="number" id="input-total" value="1"></div>
            <div class="form-group"><label>Satuan</label>
                <select id="input-satuan">
                    <option value="Pcs">Pcs</option><option value="Set">Set</option><option value="Unit">Unit</option>
                </select>
            </div>
        </div>
        <button class="btn-submit" id="btn-save">SIMPAN BARANG</button>
    </div>

    <script src="../assets/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script>
        let nextId = "";
        database.ref('/').orderByKey().limitToLast(1).on('value', snap => {
            let last = 0; snap.forEach(c => last = parseInt(c.key) || 0);
            nextId = (last + 1).toString().padStart(3, '0');
            document.getElementById('display-id').innerText = "#" + nextId;
        });

        document.getElementById('file-input').addEventListener('change', async e => {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('loading').style.display = 'flex';
            const fd = new FormData(); fd.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const json = await res.json();
                if (json.success) {
