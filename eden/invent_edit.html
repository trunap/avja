<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Barang - Digital Invitation</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .edit-container { max-width: 600px; margin: auto; padding: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 800; font-size: 14px; color: #9ab3d5; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); 
            padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; box-sizing: border-box;
        }
        .photo-preview { 
            width: 100%; height: 250px; border-radius: 12px; border: 2px dashed var(--line); 
            margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover; background-position: center;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-save { background: var(--it); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 20px; }
        
        /* Loading Overlay */
        #loading { position: fixed; inset:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; color: white; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading"><p>Sedang Mengunggah Foto...</p></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">← CANCEL</a>
            <h3 style="font-weight:900;">EDIT DATA</h3>
        </div>
    </nav>

    <div class="edit-container container">
        <div class="form-group">
            <label>Foto Barang</label>
            <div class="photo-preview" id="photo-preview">
                <span id="preview-text" style="opacity:0.3">Belum ada foto</span>
            </div>
            <input type="file" id="file-input" accept="image/*" style="margin-top: 10px;">
            <input type="hidden" id="foto-url-hidden">
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="input-nama">
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <textarea id="input-keterangan" rows="3"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Sisa</label>
                <input type="number" id="input-sisa">
            </div>
            <div class="form-group">
                <label>Total</label>
                <input type="number" id="input-total">
            </div>
        </div>

        <button class="btn-save" id="btn-save">SIMPAN PERUBAHAN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
    // 1. Konfigurasi Firebase (Tetap pakai milikmu)
    const firebaseConfig = { apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0" };
    const IMGBB_API_KEY = "1ea7916278d418913459909e1a4985ec"; // Ambil dari api.imgbb.com

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Ambil ID Barang dari URL (?id=001)
    const idBarang = new URLSearchParams(window.location.search).get('id');
    const refBarang = database.ref('/' + idBarang);

    // Variabel elemen
    const inputNama = document.getElementById('input-nama');
    const inputKet = document.getElementById('input-keterangan');
    const inputSisa = document.getElementById('input-sisa');
    const inputTotal = document.getElementById('input-total');
    const inputSatuan = document.getElementById('input-satuan');
    const fotoHidden = document.getElementById('foto-url-hidden');
    const photoPreview = document.getElementById('photo-preview');

    // --- A. AMBIL DATA REALTIME ---
    // Menggunakan 'on' supaya jika ada orang lain yang edit di saat bersamaan, form kamu ikut update
    refBarang.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            inputNama.value = data.nama || "";
            inputKet.value = data.keterangan || "";
            inputSisa.value = data.sisa || 0;
            inputTotal.value = data.total || 0;
            inputSatuan.value = data.satuan || "Unit";
            fotoHidden.value = data.foto_url || "";
            
            // Update preview foto jika ada URL-nya
            if (data.foto_url) {
                photoPreview.innerHTML = `<img src="${data.foto_url}" style="width:100%; height:100%; object-fit:cover;">`;
            }
        }
    });

    // --- B. PROSES UPLOAD FOTO KE IMGBB ---
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('loading').style.display = 'flex';
        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                const urlBaru = result.data.url;
                fotoHidden.value = urlBaru;
                photoPreview.innerHTML = `<img src="${urlBaru}" style="width:100%; height:100%; object-fit:cover;">`;
            }
        } catch (err) {
            alert("Gagal upload foto ke ImgBB!");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });

    // --- C. SIMPAN PERUBAHAN KE FIREBASE ---
    document.getElementById('btn-save').addEventListener('click', (e) => {
        e.preventDefault(); // Mencegah page reload

        // Kita kumpulkan data terbaru dari form
        const dataBaru = {
            nama: inputNama.value,
            keterangan: inputKet.value,
            sisa: parseInt(inputSisa.value) || 0,
            total: parseInt(inputTotal.value) || 0,
            satuan: inputSatuan.value,
            foto_url: fotoHidden.value,
            last_updated: new Date().toLocaleString() // Tambahan info waktu update
        };

        // Kirim ke Firebase
        refBarang.update(dataBaru)
            .then(() => {
                alert("Muantap! Data berhasil diperbarui.");
                // Setelah simpan, arahkan balik ke halaman detail
                window.location.href = `detail.html?id=${idBarang}`;
            })
            .catch((error) => {
                alert("Yah, gagal simpan: " + error.message);
            });
    });
</script>
</body>
</html>
