<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Barang - Digital Invitation</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .edit-container { max-width: 600px; margin: auto; padding: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 800; font-size: 14px; color: #9ab3d5; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); 
            padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; box-sizing: border-box;
        }
        .photo-preview { 
            width: 100%; height: 250px; border-radius: 12px; border: 2px dashed var(--line); 
            margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover; background-position: center;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-save { background: var(--it); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 20px; }
        
        /* Loading Overlay */
        #loading { position: fixed; inset:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; color: white; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading"><p>Sedang Mengunggah Foto...</p></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">← CANCEL</a>
            <h3 style="font-weight:900;">EDIT DATA</h3>
        </div>
    </nav>

    <div class="edit-container container">
        <div class="form-group">
            <label>Foto Barang</label>
            <div class="photo-preview" id="photo-preview">
                <span id="preview-text" style="opacity:0.3">Belum ada foto</span>
            </div>
            <input type="file" id="file-input" accept="image/*" style="margin-top: 10px;">
            <input type="hidden" id="foto-url-hidden">
        </div>

        <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="input-nama">
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <textarea id="input-keterangan" rows="3"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Sisa</label>
                <input type="number" id="input-sisa">
            </div>
            <div class="form-group">
                <label>Total</label>
                <input type="number" id="input-total">
            </div>
        </div>

        <button class="btn-save" id="btn-save">SIMPAN PERUBAHAN</button>
    </div>

   <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    // 1. KONFIGURASI (Ganti dengan milikmu)
    const firebaseConfig = {
        apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0"
    };
    
    // API KEY dari api.imgbb.com
    const IMGBB_API_KEY = "1ea7916278d418913459909e1a4985ec";

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const idBarang = urlParams.get('id');
    const refBarang = database.ref('/' + idBarang);

    // 2. MENGAMBIL DATA AWAL (REALTIME)
    refBarang.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('input-nama').value = data.nama || "";
            document.getElementById('input-keterangan').value = data.keterangan || "";
            document.getElementById('input-sisa').value = data.sisa || 0;
            document.getElementById('input-total').value = data.total || 0;
            document.getElementById('foto-url-hidden').value = data.foto_url || "";
            
            if (data.foto_url) {
                document.getElementById('photo-preview').innerHTML = `<img src="${data.foto_url}" style="width:100%; height:100%; object-fit:cover;">`;
            }
        }
    });

    // 3. FUNGSI TOMBOL SIMPAN (TERMASUK UPLOAD IMGBB)
    document.getElementById('btn-save').addEventListener('click', async (e) => {
        e.preventDefault();
        
        const btn = e.target;
        const fileInput = document.getElementById('file-input'); // Pastikan ID input file ini benar
        const file = fileInput.files[0];
        let linkFotoFinal = document.getElementById('foto-url-hidden').value;

        btn.innerText = "Sedang Menyimpan...";
        btn.disabled = true;

        try {
            // A. Jika user pilih file baru, upload ke ImgBB dulu
            if (file) {
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    linkFotoFinal = result.data.url; // Link baru dari ImgBB
                }
            }

            // B. Update Data ke Firebase
            await refBarang.update({
                nama: document.getElementById('input-nama').value,
                keterangan: document.getElementById('input-keterangan').value,
                sisa: parseInt(document.getElementById('input-sisa').value) || 0,
                total: parseInt(document.getElementById('input-total').value) || 0,
                foto_url: linkFotoFinal // Link disimpan di sini!
            });

            alert("Muantap! Data dan Foto Berhasil Diperbarui.");
            window.location.href = "detail.html?id=" + idBarang;

        } catch (error) {
            alert("Yah, ada error: " + error.message);
        } finally {
            btn.innerText = "SIMPAN PERUBAHAN";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
