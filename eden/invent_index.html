<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-section { padding: 0 20px; margin-top: 30px; }
        .list-container { margin-top: 15px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--card); }
        .list-item { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--line); text-decoration: none; color: inherit; }
        .list-item:hover { background: rgba(255,255,255,0.05); }
        body.light .list-item:hover { background: rgba(0,0,0,0.03); }
        .btn-pill.active { background: var(--audio); color: white; border-color: var(--audio); }
        #search-box { display: none; margin-bottom: 15px; }
        #search-box input { width: 100%; padding: 14px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">PANDUAN TEKNIS - Regional 2026</a>
            <button class="theme-toggle" id="themeBtn">🌙 Dark</button>
        </div>
    </nav>

    <div class="container header-section">
        <h1 style="font-size: 42px; font-weight: 900; margin: 0;">PANDUAN TEKNIS</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">Audio • Video • Podium • IT</p>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div class="filter-wrapper" style="display: flex; gap: 8px; overflow-x: auto;">
                <button onclick="filterBarang('Semua')" class="btn-pill active">Semua</button>
                <button onclick="filterBarang('Audio')" class="btn-pill">Audio</button>
                <button onclick="filterBarang('Video')" class="btn-pill">Video</button>
                <button onclick="filterBarang('Podium')" class="btn-pill">Podium</button>
                <button onclick="filterBarang('IT')" class="btn-pill">IT</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleSearch()" class="btn-action-circle"><i class="fas fa-search"></i></button>
                <a href="tambah_barang.html" class="btn-action-circle"><i class="fas fa-plus"></i></a>
            </div>
        </div>

        <div id="search-box"><input type="text" id="input-search" placeholder="Cari barang..."></div>
        <div class="list-container" id="inventory-list"></div>
    </div>

    <script src="../assets/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script>
        let currentFilter = "Semua";
        let allData = {};

        database.ref('/').on('value', (snapshot) => {
            allData = snapshot.val() || {};
            render();
        });

        function render() {
            const container = document.getElementById('inventory-list');
            const search = document.getElementById('input-search').value.toLowerCase();
            container.innerHTML = '';
            
            Object.entries(allData).forEach(([key, data]) => {
                const matchKat = currentFilter === "Semua" || data.kategori === currentFilter;
                const matchSearch = data.nama.toLowerCase().includes(search);
                if (matchKat && matchSearch) {
                    const isHabis = data.sisa <= 0;
                    container.innerHTML += `
                        <a href="detail.html?id=${key}" class="list-item">
                            <div class="status-circle" style="background:${isHabis ? '#ff4d4d' : 'var(--audio)'}"></div>
                            <div class="item-info">
                                <span class="item-name" style="color:${isHabis ? '#ff4d4d' : 'inherit'}">${data.nama}</span>
                                <span class="item-meta">${data.kategori} | Sisa: ${data.sisa} ${data.satuan}</span>
                            </div>
                            <i class="fas fa-chevron-right" style="opacity:0.2"></i>
                        </a>`;
                }
            });
        }

        function filterBarang(kat) {
            currentFilter = kat;
            document.querySelectorAll('.btn-pill').forEach(b => b.classList.toggle('active', b.innerText === kat));
            render();
        }

        function toggleSearch() {
            const box = document.getElementById('search-box');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }
        document.getElementById('input-search').addEventListener('input', render);
    </script>
</body>
</html>
