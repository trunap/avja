<!DOCTYPE html>

<link rel="stylesheet" href="../assets/style.css"> <style>
	
	/* Tombol Plus Bulat */
.btn-plus-circle {
    width: 42px;
    height: 42px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.btn-plus-circle:hover {
    background: var(--it);
    color: white;
    transform: rotate(90deg) scale(1.1);
    border-color: var(--it);
}

/* Tombol Kategori Lonjong (Pill) */
.btn-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    white-space: nowrap;
}
.btn-pill:hover { background: rgba(255,255,255,0.1); }
.btn-pill.active { 
    background: var(--audio); 
    color: white; 
    border-color: var(--audio);
    box-shadow: 0 4px 12px rgba(77, 183, 255, 0.3);
}
	</style>
    <meta charset="UTF-8">

    <style>
        /* Penyesuaian khusus agar list inventaris rapi dalam tema baru */
        .list-container { margin-top: 20px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--card); }

        .list-item:hover { background: rgba(255,255,255,0.05); }
        body.light .list-item:hover { background: rgba(0,0,0,0.03); }
        .status-circle { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: 800; font-size: 18px; display: block; }
        .item-meta { opacity: 0.6; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">

</div>        <div class="list-container" id="inventory-list">

    <script>
        const firebaseConfig = {
			  apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0"
			
		};
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

// AMBIL DATA DARI CONFIG.JS
database.ref('/').on('value', (snapshot) => {
    const allData = snapshot.val();
    const listContainer = document.getElementById('inventory-list');
    listContainer.innerHTML = '';

    if (allData) {
        Object.entries(allData).forEach(([key, data]) => {
            if (data && data.nama) {
                // RULE WARNA: Merah jika sisa 0, Biru jika > 0
                const isHabis = (parseInt(data.sisa) <= 0);
                const colorTheme = isHabis ? '#ff4d4d' : 'var(--audio)'; // Merah vs Biru
                
                const itemHTML = `
                    <a href="detail.html?id=${key}" class="list-item">
                        <div class="status-circle" style="background:${colorTheme}"></div>
                        <div class="item-info">
                            <span class="item-name" style="color:${isHabis ? '#ff4d4d' : 'inherit'}">${data.nama}</span>
                            <span class="item-meta">${data.keterangan || '-'} | Sisa: ${data.sisa} ${data.satuan}</span>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                    </a>
                `;
                listContainer.innerHTML += itemHTML;
            }
        });
    }
});
		let currentFilter = "Semua";

function filterBarang(kat) {
    currentFilter = kat;
    renderList(); // Panggil fungsi untuk gambar ulang list
}

function renderList() {
    database.ref('/').once('value').then((snapshot) => {
        const allData = snapshot.val();
        const listContainer = document.getElementById('inventory-list');
        listContainer.innerHTML = '';

        Object.entries(allData).forEach(([key, data]) => {
            // Logika Filter: Tampilkan jika kategori cocok atau filter adalah 'Semua'
            if (currentFilter === "Semua" || data.kategori === currentFilter) {
                const isHabis = (parseInt(data.sisa) <= 0);
                const colorTheme = isHabis ? '#ff4d4d' : 'var(--audio)';
                
                listContainer.innerHTML += `
                    <a href="detail.html?id=${key}" class="list-item">
                        <div class="status-circle" style="background:${colorTheme}"></div>
                        <div class="item-info">
                            <span class="item-name" style="color:${isHabis ? '#ff4d4d' : 'inherit'}">${data.nama}</span>
                            <span class="item-meta">${data.kategori || 'Lain-lain'} | Sisa: ${data.sisa}</span>
                        </div>
                    </a>`;
            }
        });
    });
}
// Panggil pertama kali saat loading
renderList();
    </script>
