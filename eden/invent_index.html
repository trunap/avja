<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tambahkan CSS Pill agar tidak kotak-kotak */
        .btn-pill {
            background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text);
            padding: 9px 18px; border-radius: 50px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .btn-pill.active { background: var(--audio); color: white; border-color: var(--audio); }
        body.light .btn-pill { background: #fff; color: #333; }

        .list-container { margin-top: 10px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--card); min-height: 100px; }
        .list-item { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--line); text-decoration: none; color: inherit; }
        .list-item:hover { background: rgba(255,255,255,0.05); }
        .status-circle { width: 10px; height: 10px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: 800; font-size: 17px; display: block; }
        .item-meta { opacity: 0.5; font-size: 12px; }

        .btn-action-circle {
            width: 40px; height: 40px; background: var(--card); border: 1px solid var(--line);
            color: var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none;
        }
        #search-container { display: none; margin-bottom: 20px; }
        #input-search { width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="container" style="padding: 0 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px;">
            <div class="filter-wrapper" style="display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;">
                <button onclick="filterBarang('Semua')" class="btn-pill active">Semua</button>
                <button onclick="filterBarang('Audio')" class="btn-pill">Audio</button>
                <button onclick="filterBarang('Video')" class="btn-pill">Video</button>
                <button onclick="filterBarang('Podium')" class="btn-pill">Podium</button>
                <button onclick="filterBarang('IT')" class="btn-pill">IT</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleSearch()" class="btn-action-circle"><i class="fas fa-search"></i></button>
                <a href="tambah_barang.html" class="btn-action-circle"><i class="fas fa-plus"></i></a>
            </div>
        </div>

        <div id="search-container">
            <input type="text" id="input-search" placeholder="Cari nama barang...">
        </div>

        <div class="list-container" id="inventory-list">
            <p style="padding:40px; opacity:0.3; text-align:center;">Memuat data inventaris...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script src="navbar.js"></script> <script src="../assets/theme.js"></script>

    <script>
        let currentFilter = "Semua";
        let allItems = {};

        // Ambil Data
        database.ref('/').on('value', (snapshot) => {
            allItems = snapshot.val() || {};
            renderList();
        });

        function renderList() {
            const container = document.getElementById('inventory-list');
            const keyword = document.getElementById('input-search').value.toLowerCase();
            container.innerHTML = '';
            
            Object.entries(allItems).forEach(([key, data]) => {
                if (!data || !data.nama) return;
                const matchFilter = (currentFilter === "Semua" || data.kategori === currentFilter);
                const matchSearch = data.nama.toLowerCase().includes(keyword);

                if (matchFilter && matchSearch) {
                    const isHabis = (parseInt(data.sisa) <= 0);
                    container.innerHTML += `
                        <a href="detail.html?id=${key}" class="list-item">
                            <div class="status-circle" style="background:${isHabis ? '#ff4d4d' : 'var(--audio)'}"></div>
                            <div class="item-info">
                                <span class="item-name" style="color:${isHabis ? '#ff4d4d' : 'inherit'}">${data.nama}</span>
                                <span class="item-meta">${data.kategori} | Sisa: ${data.sisa}</span>
                            </div>
                            <i class="fas fa-chevron-right" style="opacity:0.2"></i>
                        </a>`;
                }
            });
        }

        function filterBarang(kat) {
            currentFilter = kat;
            document.querySelectorAll('.btn-pill').forEach(btn => btn.classList.toggle('active', btn.innerText === kat));
            renderList();
        }

        function toggleSearch() {
            const box = document.getElementById('search-container');
            box.style.display = box.style.display === "none" ? "block" : "none";
        }
        document.getElementById('input-search').addEventListener('input', renderList);
    </script>
</body>
</html>
