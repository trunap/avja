<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris - Regional 2026</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Penyesuaian khusus agar list inventaris rapi dalam tema baru */
        .list-container { margin-top: 20px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--card); }
        .list-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid var(--line); text-decoration: none; color: inherit; transition: .25s; }
        .list-item:hover { background: rgba(255,255,255,0.05); }
        body.light .list-item:hover { background: rgba(0,0,0,0.03); }
        .status-circle { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: 800; font-size: 18px; display: block; }
        .item-meta { opacity: 0.6; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="invent_index.html" class="brand">REGIONAL 2026</a>
            <div class="nav">
                <button class="theme-toggle" id="themeBtn">🌙 Dark</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="hero-title">Semua Inventaris</h1>
        <p class="hero-sub">Daftar perlengkapan teknis regional.</p>

        <div class="list-container" id="inventory-list">
            <p style="padding:20px; opacity:0.5;">Menghubungkan ke Firebase...</p>
        </div>
    </div>

    <script src="../assets/theme.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
			  apiKey: "AIzaSyBNHkgkLR6WEQXDU7OdMyyWuoo-8jcSERo",
		  authDomain: "panduanteknis-6e258.firebaseapp.com",
		  databaseURL: "https://panduanteknis-6e258-default-rtdb.firebaseio.com",
		  projectId: "panduanteknis-6e258",
		  storageBucket: "panduanteknis-6e258.firebasestorage.app",
		  messagingSenderId: "202324364776",
		  appId: "1:202324364776:web:ddaf872764e19e5413685d",
		  measurementId: "G-VGFJF9L8W0"
			
		};
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // AMBIL DATA DARI CONFIG.JS
database.ref('/').on('value', (snapshot) => {
    const allData = snapshot.val();
    const listContainer = document.getElementById('inventory-list');
    listContainer.innerHTML = '';

    if (allData) {
        Object.entries(allData).forEach(([key, data]) => {
            if (data && data.nama) {
                // LOGIKA WARNA: Merah jika sisa 0 atau status_habis aktif
                const isHabis = (data.sisa <= 0 || data.status_habis === true);
                const colorTheme = isHabis ? '#ff4d4d' : 'var(--audio)'; // Merah vs Biru
                
                const itemHTML = `
                    <a href="detail.html?id=${key}" class="list-item">
                        <div class="status-circle" style="background:${colorTheme}"></div>
                        <div class="item-info">
                            <span class="item-name" style="color:${isHabis ? '#ff4d4d' : 'inherit'}">${data.nama}</span>
                            <span class="item-meta">${data.keterangan || '-'} | Sisa: ${data.sisa} ${data.satuan}</span>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                    </a>
                `;
                listContainer.innerHTML += itemHTML;
            }
        });
    }
});
    </script>
</body>
</html>
