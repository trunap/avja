<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panduan Teknis — Stage</title>

  <!-- CSS global -->
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    /* ----------- EXTRA PAGE STYLE ----------- */

    .page-wrap {
      max-width: 1050px;
      margin: auto;
      padding: 32px 20px;
    }

    /* Title */
    .section-title {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .section-sub {
      opacity: .7;
      margin-bottom: 26px;
    }

    /* General card wrapper */
    .card-block {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 26px;
      margin-bottom: 32px;
      box-shadow: 0 8px 26px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      transition: .25s;
    }
    .card-block:hover {
      transform: translateY(-3px);
    }

    .block-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--stage);
    }

    /* Image reminder area */
    .reminder-image-area {
      text-align: center;
      padding: 16px 0;
    }

    .reminder-image-area img {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .reminder-label {
      font-weight: 800;
      margin-top: 6px;
    }

    /* Checklist table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }
    td:first-child {
      text-align: left;
      padding-left: 24px;
    }

    td[contenteditable] {
      cursor: text;
      border-radius: 6px;
      transition: .25s;
    }
    td[contenteditable]:hover {
      background: rgba(255,255,255,0.05);
    }
    td[contenteditable]:focus {
      outline: 2px solid #facc15;
      background: rgba(255,255,200,0.15);
    }
  </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">
    <a class="brand" href="index.html">PANDUAN TEKNIS</a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="audio.html">Audio</a>
      <a href="video.html">Video</a>
      <a class="active" href="stage.html">Stage</a>
      <a href="it.html">IT</a>
      <a href="apendiks.html">Apendiks</a>

      <button id="themeBtn" class="theme-toggle">🌙 Dark</button>
    </nav>
  </div>
</div>

<!-- ✅ THEME SCRIPT -->
<script src="assets/theme.js"></script>

<div class="page-wrap">

  <!-- HEADER -->
  <h1 class="section-title">Stage</h1>
  <p class="section-sub">Pengingat • Posisi Mikrofon • Checklist Podium</p>


  <!-- ================================================= -->
  <!-- ✅ 1) AREA PENGINGAT – kamu tinggal taruh gambar -->
  <!-- ================================================= -->
  <div class="card-block">

    <div class="block-title">
      📌 Pengingat — Posisi Mikrofon
    </div>

    <!-- ✅ Kamu cukup ganti isi div ini dengan <img src="assets/img/xxxx.png"> -->
    <div class="reminder-image-area">

      <!-- CONTOH PENEMPATAN GAMBAR -->
      <!-- Hapus dan ganti dengan file kamu -->
      <img src="assets/img/mic-positition.png" alt="Posisi Salah dan Benar">
      <div class="reminder-label" style="color:#ff6b6b;">Salah</div>


      <!-- Kamu tinggal ganti dengan:
      <img src="assets/img/NAMA_FILE_KAMU.png">
      Atau dua gambar lainnya -->
    </div>

  </div>


  <!-- =========================================== -->
  <!-- ✅ 2) CHECKLIST PODIUM -->
  <!-- =========================================== -->
  <div class="card-block">

    <div class="block-title">🎤 Checklist Podium</div>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Keterangan</th>
        </tr>
      </thead>

      <tbody>
        <tr><td>Mikrofon</td><td contenteditable="true"></td></tr>
        <tr><td>Stand Mic</td><td contenteditable="true"></td></tr>
        <tr><td>Posisi Mikrofon</td><td contenteditable="true"></td></tr>
        <tr><td>Kabel</td><td contenteditable="true"></td></tr>
        <tr><td>Pencahayaan Podium</td><td contenteditable="true"></td></tr>
        <tr><td>Area Talent Bersih</td><td contenteditable="true"></td></tr>
        <tr><td>Safety (tidak ada kabel mengganggu)</td><td contenteditable="true"></td></tr>
      </tbody>
    </table>

  </div>

</div>

</body>
</html>
